<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>SkySync - Flight Management</title>
    <style>
      body {
        font-family: "Courier New", monospace;
        background: #1a1a2e;
        color: #fff;
        padding: 20px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .card {
        border: 2px solid #0f3460;
        padding: 20px;
        background: #16213e;
        border-radius: 10px;
      }
      input,
      button {
        padding: 10px;
        margin: 5px 0;
        width: 100%;
        border-radius: 5px;
        border: none;
      }
      button {
        background: #e94560;
        color: white;
        cursor: pointer;
        font-weight: bold;
      }
      .disponible {
        color: #00ff41;
      }
      .lleno {
        color: #ff4d4d;
      }
    </style>
  </head>
  <body>
    <h1>🛫 SkySync: Panel de Control</h1>
    <div class="grid">
      <div class="card">
        <h2>1. Buscador</h2>
        <input
          type="text"
          id="inputDestino"
          placeholder="Ciudad de destino..."
        />
        <button onclick="ejecutarBusqueda()">Buscar Vuelos</button>
        <div id="resultadosBusqueda"></div>
      </div>
      <div class="card">
        <h2>2. Estadísticas de Flota</h2>
        <button onclick="mostrarEstadisticas()">Actualizar Reporte</button>
        <div id="reporteGral"></div>
      </div>
    </div>

    <script src="./assets/js/vuelos_db.js"></script>
    <script src="./assets/js/motor_logica.js"></script>
  </body>
</html>
